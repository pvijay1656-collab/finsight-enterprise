<h1>⚙️ Settings</h1>

<div class="settings-card">
<h2>👤 Profile</h2>

<p>Name: <span id="userName"></span></p>

<p>Email: <span id="userEmail"></span></p>

<button>
Update Profile
</button>

</div>
<script>

const user =
JSON.parse(
localStorage.getItem(
"finsight_user"
)
);

if(user){

document.getElementById(
"userName"
).innerText =
user.fullName || "User";

document.getElementById(
"userEmail"
).innerText =
user.email;

}

</script>
